<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Staff App</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <style>
        body {
            font-family: 'Tahoma', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app-card {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 45px 20px 30px 20px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            text-align: center;
        }

        /* دوگمەی X لە سووچی سەرەوە */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 32px;
            height: 32px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            display: none; /* تەنها کاتێک لۆگینە دەردەکەوێت */
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 8px rgba(255, 71, 87, 0.3);
            z-index: 10;
        }

        input {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: 2px solid #eee;
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }

        input:focus { border-color: #1a73e8; background: #fcfcfc; }

        button.main-btn {
            width: 100%;
            padding: 16px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        button.main-btn:active { transform: scale(0.98); }

        #inputArea { display: none; }
        
        .welcome-badge {
            font-size: 13px;
            color: #1a73e8;
            background: #e8f0fe;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="app-card">
    <button class="close-btn" id="logoutBtn" onclick="logout()">×</button>

    <div id="loginArea">
        <h2 style="color: #333; margin-bottom: 25px;">چوونە ژوورەوە</h2>
        <input type="text" id="u" placeholder="ناوی ستاف" autocomplete="off">
        <input type="password" id="p" placeholder="پاسۆرد">
        <button class="main-btn" onclick="login()">لۆگین</button>
    </div>

    <div id="inputArea">
        <div class="welcome-badge">ستاف: <b id="userLabel"></b></div>
        <h2 style="color: #333; margin-bottom: 20px;">داخڵکردنی ئۆتۆمبێل</h2>
        <input type="number" id="carNum" placeholder="ژمارەی ئۆتۆمبێل بنووسە" inputmode="numeric">
        <button class="main-btn" style="background: #27ae60;" onclick="saveData()">خەزنکردن ✅</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMI84_IuKUZVqc8ImMW7eahru20cTkjFM",
        authDomain: "sysam-k.firebaseapp.com",
        projectId: "sysam-k",
        storageBucket: "sysam-k.firebasestorage.app",
        messagingSenderId: "905972435434",
        appId: "1:905972435434:web:2501e11240523f8368ca93"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // پشکنینی لۆگینی پێشوو
    window.onload = function() {
        const savedUser = localStorage.getItem('staffUser');
        if (savedUser) {
            goToInputArea(savedUser);
        }
    };

    async function login() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value;

        if (!u || !p) return alert("تکایە خانەکان پڕ بکەرەوە");

        const doc = await db.collection('StaffUsers').doc(u).get();
        if (doc.exists && doc.data().password === p) {
            localStorage.setItem('staffUser', u); 
            goToInputArea(u);
        } else {
            alert("ناو یان پاسۆرد هەڵەیە");
        }
    }

    function goToInputArea(username) {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('inputArea').style.display = 'block';
        document.getElementById('logoutBtn').style.display = 'flex';
        document.getElementById('userLabel').innerText = username;
    }

    function goToLoginArea() {
        document.getElementById('loginArea').style.display = 'block';
        document.getElementById('inputArea').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'none';
        document.getElementById('u').value = "";
        document.getElementById('p').value = "";
    }

    function saveData() {
        const num = document.getElementById('carNum').value;
        if (!num) return;

        db.collection('StaffInputs').add({
            carNumber: num,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            alert("خەزن کرا");
            document.getElementById('carNum').value = "";
        });
    }

    function logout() {
        localStorage.removeItem('staffUser'); // سڕینەوەی لۆگین لە مۆبایلەکە
        goToLoginArea(); // گەڕانەوە بۆ شاشەی لۆگین بەبێ ڕیفرێش
    }
</script>

</body>
</html>
